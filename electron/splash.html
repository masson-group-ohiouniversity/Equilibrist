<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Equilibrist</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0e1117;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      flex-direction: column;
      gap: 1.5rem;
    }
    h1 { font-size: 2rem; font-weight: 600; letter-spacing: 0.02em; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #ff4b4b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 0.9rem; color: #888; transition: opacity 0.3s; }
    .bar-track {
      width: 220px; height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%;
      background: #ff4b4b;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
  </style>
</head>
<body>
  <h1>Equilibrist</h1>
  <div class="spinner"></div>
  <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
  <p class="status" id="status">Initializing&hellip;</p>
  <script>
    const steps = [
      [1500,  15, "Loading Python runtime\u2026"],
      [3500,  40, "Importing libraries\u2026"],
      [6000,  65, "Starting Streamlit server\u2026"],
      [9000,  85, "Almost ready\u2026"],
      [14000, 95, "Finishing up\u2026"],
    ];
    const bar = document.getElementById("bar");
    const status = document.getElementById("status");
    steps.forEach(([ms, pct, text]) => {
      setTimeout(() => { bar.style.width = pct + "%"; status.textContent = text; }, ms);
    });
  </script>
</body>
</html>
